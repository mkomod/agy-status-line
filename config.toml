# Status line configuration.

# Toggle segments on/off. Order here is the order they render.
[modules]
"5h" = true     # 5-hour usage quota
"7d" = true     # weekly usage quota
ctx = true      # context-window fill
clock = false   # current time

# Colour role -> colour name (names are defined in [color_codes] below).
[colors]
bar = "green"     # filled portion of the bars
value = "green"   # percentages and clock time
label = "dim"     # labels, empty bar portion, reset countdowns

# Display options.
[display]
bar_width = 8       # characters per bar
separator = "  |  " # text between segments
fill_char = "█"     # filled bar character
empty_char = "░"    # empty bar character
fallback_width = 80 # terminal width assumed when the payload omits it

# Colour name -> ANSI escape code. Use the \u001b (ESC) escape. "reset" required.
[color_codes]
reset   = "\u001b[0m"
none    = ""
dim     = "\u001b[2m"
black   = "\u001b[30m"
red     = "\u001b[91m"
green   = "\u001b[92m"
yellow  = "\u001b[93m"
blue    = "\u001b[94m"
magenta = "\u001b[95m"
cyan    = "\u001b[96m"
white   = "\u001b[97m"
gray    = "\u001b[90m"
grey    = "\u001b[90m"
